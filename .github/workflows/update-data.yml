name: Update Station Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Station Data
        run: python scripts/fetch_geojson.py

      - name: Commit and push
        run: |
         git config user.name "github-actions"
         git config user.email "github-actions@github.com"
         git add data/stations.json
         git stash
         git pull --rebase origin main
         git stash pop
         git add data/stations.json
         git commit -m "Update station data [skip ci]" || echo "No changes to commit"
         git push
